---
# kics-scan disable=1c1325ff-831d-43a1-973e-839ae57dfcc0,d6355c88-1e8d-49e9-b2f2-f8a1ca12c75b
# Disabled queries (and the reason they're accepted):
#   1c1325ff... Volume Has Sensitive Host Directory
#   d6355c88... Docker Socket Mounted In Container
# Portainer agent's job is to manage the host Docker daemon. Mounting the docker
# socket and /var/lib/docker/volumes is required for normal operation.
name: portainer-agent
services:
  portainer-agent:
    image: docker.io/portainer/agent:2.43.0-alpine
    container_name: portainer-agent
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes
    ports:
      - '0.0.0.0:9001:9001'
    restart: unless-stopped
    healthcheck:
      # TCP liveness only (not an HTTPS /ping check): busybox wget's https://
      # probe forks a second process (ssl_client) for the TLS handshake, and
      # that forked process leaks ~1 thread per probe in the agent's Go TLS
      # server. Over days this exhausts the host's pids ceiling, after which
      # nothing in the container can fork -- including the probe's own wget
      # -- pinning the container "unhealthy" forever. 127.0.0.1 (not
      # localhost) avoids an IPv6 probe against the agent's IPv4 bind.
      test:
        - CMD
        - nc
        - -z
        - 127.0.0.1
        - '9001'
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
