---
name: portainer
include:
  - ../portainer-agent/docker-compose.yaml
services:
  certbot:
    image: certbot/dns-route53:latest
    container_name: certbot
    entrypoint: /opt/certbot/entrypoint.sh
    environment:
      - DOMAIN=${DOMAIN}
      - EMAIL=${EMAIL}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
    volumes:
      - letsencrypt:/etc/letsencrypt
      - ./certbot-entrypoint.sh:/opt/certbot/entrypoint.sh:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test:
        - CMD-SHELL
        - test -f /etc/letsencrypt/live/${DOMAIN}/fullchain.pem
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s
    restart: unless-stopped

  portainer:
    image: portainer/portainer-ee:2.39.0-alpine
    container_name: portainer
    command:
      - --sslcert
      - /certs/live/${DOMAIN}/fullchain.pem
      - --sslkey
      - /certs/live/${DOMAIN}/privkey.pem
    volumes:
      - ../data:/data
      - letsencrypt:/certs:ro
    ports:
      - '0.0.0.0:9443:9443'
    depends_on:
      certbot:
        condition: service_healthy
    restart: unless-stopped

volumes:
  letsencrypt:
