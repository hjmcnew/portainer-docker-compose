---
name: portainer
include:
  - ../portainer-agent/docker-compose.yaml
services:
  certbot:
    image: certbot/dns-route53:v5.5.0
    container_name: certbot
    volumes:
      - letsencrypt:/etc/letsencrypt
    environment:
      - DOMAIN=${DOMAIN}
      - EMAIL=${EMAIL}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
    command:
      - -c
      - |
        if [ ! -f /etc/letsencrypt/live/${DOMAIN}/fullchain.pem ]; then
          certbot certonly \
            --dns-route53 \
            --non-interactive \
            --agree-tos \
            --email ${EMAIL} \
            -d ${DOMAIN} \
            --key-type ecdsa
        fi
        sleep infinity
    entrypoint: /bin/sh
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test:
        - CMD-SHELL
        - test -f /etc/letsencrypt/live/${DOMAIN}/fullchain.pem
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s
    labels:
      ofelia.job-exec.certbot-renew.schedule: "0 23 0 * * 1"
      ofelia.job-exec.certbot-renew.command: 'certbot renew --deploy-hook "touch /etc/letsencrypt/.renewed"'

  portainer:
    image: portainer/portainer-ee:2.39.1-alpine
    container_name: portainer
    depends_on:
      certbot:
        condition: service_healthy
    volumes:
      - ../data:/data
      - letsencrypt:/certs:ro
    ports:
      - "0.0.0.0:9443:9443"
    command:
      - --tlscert
      - /certs/live/${DOMAIN}/fullchain.pem
      - --tlskey
      - /certs/live/${DOMAIN}/privkey.pem
    restart: unless-stopped

volumes:
  letsencrypt:
