---
# kics-scan disable=8c978947-0ff6-485c-b0c2-0bfca6026466,d6355c88-1e8d-49e9-b2f2-f8a1ca12c75b,1c1325ff-831d-43a1-973e-839ae57dfcc0
# Disabled queries (and the reason each is accepted):
#   8c978947... Shared Volumes Between Containers
# The `letsencrypt` named volume is the cert handoff between certbot (writer)
# and portainer (reader). Sharing is the entire design.
#   d6355c88... Docker Socket Mounted In Container
#   1c1325ff... Volume Has Sensitive Host Directory
# Both fire on ofelia's read-only docker.sock mount. ofelia is a
# label-driven docker scheduler; reading the socket is its core function
# and there is no path to ofelia working without it.
name: portainer
include:
  - ../portainer-agent/docker-compose.yaml
services:
  certbot:
    image: certbot/dns-route53:v5.5.0
    container_name: certbot
    volumes:
      - letsencrypt:/etc/letsencrypt
    environment:
      - DOMAIN=${DOMAIN}
      - EMAIL=${EMAIL}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
    command:
      - -c
      - |
        if [ ! -f /etc/letsencrypt/live/${DOMAIN}/fullchain.pem ]; then
          certbot certonly \
            --dns-route53 \
            --non-interactive \
            --agree-tos \
            --email ${EMAIL} \
            -d ${DOMAIN} \
            --key-type ecdsa
        fi
        sleep infinity
    entrypoint: /bin/sh
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - test -f /etc/letsencrypt/live/${DOMAIN}/fullchain.pem
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s
    labels:
      ofelia.enabled: 'true'
      ofelia.job-exec.certbot-renew.schedule: '0 23 0 * * 1'
      ofelia.job-exec.certbot-renew.command: >-
        certbot renew --deploy-hook "touch /etc/letsencrypt/.renewed"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  ofelia:
    image: ghcr.io/netresearch/ofelia:0.23.1
    container_name: ofelia
    depends_on:
      certbot:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      OFELIA_ENABLE_WEB: 'true'
      OFELIA_WEB_ADDRESS: 127.0.0.1:8081
    command: daemon
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - wget
        - --no-verbose
        - --tries=1
        - --spider
        # 127.0.0.1 (not localhost) — busybox wget resolves localhost to
        # [::1] first, but ofelia binds OFELIA_WEB_ADDRESS=127.0.0.1:8081
        # (v4 only), so an IPv6 probe gets connection refused.
        - http://127.0.0.1:8081/
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 30s
    labels:
      ofelia.job-run.restart-portainer.schedule: '0 28 0 * * 1'
      ofelia.job-run.restart-portainer.image: 'docker:cli'
      ofelia.job-run.restart-portainer.command: >-
        sh -c "docker exec certbot test -f /etc/letsencrypt/.renewed
        && docker restart portainer
        && docker exec certbot rm /etc/letsencrypt/.renewed
        || true"
      ofelia.job-run.restart-portainer.volume: '/var/run/docker.sock:/var/run/docker.sock'
      ofelia.job-run.restart-portainer.delete: 'true'
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  portainer:
    image: portainer/portainer-ee:2.39.1-alpine
    container_name: portainer
    depends_on:
      certbot:
        condition: service_healthy
    volumes:
      - ../data:/data
      - letsencrypt:/certs:ro
    ports:
      - '0.0.0.0:9443:9443'
    command:
      - --tlscert
      - /certs/live/${DOMAIN}/fullchain.pem
      - --tlskey
      - /certs/live/${DOMAIN}/privkey.pem
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - wget
        - -q
        - --no-check-certificate
        - --spider
        - https://localhost:9443/
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    cap_drop:
      # Drop the Docker-default caps portainer doesn't need. Kept (effective):
      # DAC_OVERRIDE (mkdir /data/certs/CAs on host-owned bind mount),
      # CHOWN/FOWNER (manage cert file ownership/mode under /data),
      # SETUID/SETGID (defensive — internal privilege drops if any).
      # Listed explicitly rather than `cap_drop: ALL` + `cap_add: [...]`
      # because KICS ce76b7d0 fires on the presence of `cap_add`.
      - AUDIT_WRITE
      - FSETID
      - KILL
      - MKNOD
      - NET_BIND_SERVICE
      - NET_RAW
      - SETFCAP
      - SETPCAP
      - SYS_CHROOT
    security_opt:
      - no-new-privileges:true

volumes:
  letsencrypt:
